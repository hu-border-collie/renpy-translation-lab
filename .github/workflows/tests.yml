name: Tests

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  dependency-locks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.11"

      - name: Verify dependency lock manifest
        run: python -B scripts/compile_dependency_locks.py --check

  litellm-lock-install:
    name: LiteLLM lock install (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            lock: requirements-lock/py311-linux-litellm.txt
          - os: windows-latest
            lock: requirements-lock/py311-windows-litellm.txt

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ${{ matrix.lock }}

      - name: Install locked LiteLLM profile
        run: |
          python -m pip install --upgrade pip
          python -m pip install --require-hashes -r "${{ matrix.lock }}"

  unittest:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            lock: requirements-lock/py311-gui.txt
          - os: windows-latest
            lock: requirements-lock/py311-gui.txt

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ${{ matrix.lock }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --require-hashes -r "${{ matrix.lock }}"

      - name: Install Qt runtime dependencies (Linux)
        if: runner.os == 'Linux'
        uses: ./.github/actions/install-qt-linux-deps

      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m unittest discover -s tests -p "test_*.py" -q

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: python -m unittest discover -s tests -p "test_*.py" -q

  cli-without-gui:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements-lock/py311-cli.txt

      - name: Install CLI dependencies only
        run: |
          python -m pip install --upgrade pip
          python -m pip install --require-hashes -r requirements-lock/py311-cli.txt

      - name: Verify PySide6 is not installed
        run: |
          python - <<'PY'
          import importlib.util
          if importlib.util.find_spec("PySide6") is not None:
              raise SystemExit("PySide6 should not be installed in cli-without-gui job")
          print("PySide6 not installed (expected)")
          PY

      - name: Run CLI-only tests
        run: python tests/run_cli_tests.py -q

      - name: Smoke test batch CLI entry
        run: python gemini_translate_batch.py --help

      - name: Smoke test optional GUI entry without PySide6
        shell: bash
        run: |
          set +e
          output=$(python -m gui_qt 2>&1)
          code=$?
          set -e
          if [ "$code" -ne 1 ]; then
            echo "Expected exit code 1, got $code"
            echo "$output"
            exit 1
          fi
          if echo "$output" | grep -q "Traceback (most recent call last)"; then
            echo "Unexpected traceback from python -m gui_qt:"
            echo "$output"
            exit 1
          fi
          echo "$output" | grep -q "PySide6"

  gui:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-lock/py311-gui.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --require-hashes -r requirements-lock/py311-gui.txt

      - name: Install Qt runtime dependencies (Linux)
        uses: ./.github/actions/install-qt-linux-deps

      - name: Run GUI tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: python tests/run_gui_tests.py -q
