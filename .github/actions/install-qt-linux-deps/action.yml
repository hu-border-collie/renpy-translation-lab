name: Install Qt runtime dependencies (Linux)
description: Install system packages needed for headless Qt/PySide6 on Ubuntu runners.
runs:
  using: composite
  steps:
    - run: |
        sudo apt-get update
        sudo apt-get install -y \
          libegl1 \
          libgl1 \
          libglib2.0-0 \
          libxkbcommon0 \
          libdbus-1-3 \
          libfontconfig1
      shell: bash